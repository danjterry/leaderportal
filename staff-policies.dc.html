<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    body { margin: 0; background: #FDFBF7; font-family: 'Proxima Nova', 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
    a { color: #191713; }
    a:hover { color: #4A443A; }
    ::selection { background: #F3E7D8; }
  </style>
  <meta name="robots" content="noindex, nofollow">
</helmet>

<div style="min-height:100vh; background:#FDFBF7; color:#191713;">
  <dc-import name="staff-gate" hint-size="0,0"></dc-import>
  <dc-import name="staff-nav" active="policies" style="position:sticky; top:0; z-index:40;" hint-size="100%,105px"></dc-import>

  <div style="max-width:860px; margin:0 auto; padding:clamp(28px,5vw,48px) clamp(16px,3vw,32px) clamp(40px,6vw,64px);">
    <h1 style="font-weight:800; font-size:clamp(28px,4.5vw,40px); letter-spacing:-1px; margin:0 0 10px;">Policies</h1>
    <p style="font-size:16px; line-height:1.75; color:#6E6759; margin:0 0 30px;">Current versions of every church policy. Tap to expand, then open the full document.</p>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <sc-for list="{{ policies }}" as="p" hint-placeholder-count="5">
        <div style="background:#FFFFFF; border:1px solid #ECE5D8; border-radius:16px; overflow:hidden;">
          <div onClick="{{ p.toggle }}" style="display:flex; justify-content:space-between; align-items:center; gap:14px; padding:18px clamp(18px,3vw,24px); cursor:pointer;">
            <span style="font-weight:700; font-size:16px;">{{ p.title }}</span>
            <svg width="12" height="12" viewBox="0 0 10 10" style="flex:none; transition:transform 0.15s; transform:{{ p.chev }};"><path d="M1 3l4 4 4-4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          </div>
          <sc-if value="{{ p.open }}" hint-placeholder-val="{{ false }}">
            <div style="padding:0 clamp(18px,3vw,24px) 20px; display:flex; flex-direction:column; gap:14px;">
              <div style="font-size:14.5px; line-height:1.7; color:#6E6759;">{{ p.desc }}</div>
              <a href="{{ p.href }}" target="_blank" rel="noopener" style="align-self:flex-start; font-size:14px; font-weight:700; color:#191713; text-decoration:none; border:1px solid #191713; border-radius:100px; padding:11px 22px;">Open document &#8599;</a>
            </div>
          </sc-if>
        </div>
      </sc-for>
    </div>
  </div>

  <dc-import name="staff-footer" hint-size="100%,90px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { open: null };
  items = [ // scaffold — replace titles/descriptions/links as policies are supplied
    { title: 'Safe Church Policy', desc: 'Safeguarding standards for anyone serving with children, youth, or vulnerable people.', href: '#' },
    { title: 'Financial Policy & Card Use', desc: 'Church card use, approvals, receipts, and reimbursements.', href: '#' },
    { title: 'Social Media & Communications Policy', desc: 'How we represent Citipointe online and in public communication.', href: '#' },
    { title: 'Facilities & Building Use Policy', desc: 'Booking, access, and care of church spaces at both campuses.', href: '#' },
    { title: 'Travel & Expense Policy', desc: 'Approved travel, per diems, and how to expense trips.', href: '#' },
  ];
  renderVals() {
    return {
      policies: this.items.map((p, i) => ({
        ...p,
        open: this.state.open === i,
        chev: this.state.open === i ? 'rotate(180deg)' : 'none',
        toggle: () => this.setState({ open: this.state.open === i ? null : i }),
      })),
    };
  }
}
</script>
</body>
</html>
